[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GROQ_API_KEY,LINKEDIN_ACCESS_TOKEN,LINKEDIN_CLIENT_ID,LINKEDIN_CLIENT_SECRET,LINKEDIN_PERSON_URN,PORT,POST_TIME,TIMEZONE"

[functions]
  node_bundler = "esbuild"
  included_files = ["config/**", "services/**", "data/**"]

# Redirect all /api/* and /auth/* requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
